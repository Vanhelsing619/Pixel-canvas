spring.application.name=pixel-canvas

# File-based H2 so the canvas persists across restarts (creates a ./data folder)
spring.datasource.url=jdbc:h2:file:./data/canvasdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 web console at http://localhost:8082/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# 8080 and 8081 are used by the other projects; this one runs on 8082
server.port=8082
